<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Location & Availability – NearHelper</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
  .steps { display:flex; justify-content:center; gap:8px; padding:16px 30px; background:#f8f9ff; border-bottom:1px solid #e8ecff; }
  .step { width:32px; height:6px; border-radius:3px; background:#e2e8f0; }
  .step.active { background:#667eea; }
  .step.done { background:#10b981; }

  .avail-options { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px; }
  .avail-card { background:#f8fafc; border:2px solid #e2e8f0; border-radius:14px; padding:16px; text-align:center; cursor:pointer; transition:0.3s; }
  .avail-card:hover { border-color:#667eea; }
  .avail-card.selected-avail { border-color:#22c55e; background:#f0fdf4; }
  .avail-card.selected-busy { border-color:#f59e0b; background:#fffbeb; }
  .avail-card span { font-size:28px; display:block; margin-bottom:6px; }
  .avail-card p { margin:0; font-size:13px; font-weight:600; color:#374151; }

  input[type="datetime-local"] {
    width:100%; padding:12px 16px; border:2px solid #e2e8f0; border-radius:12px;
    font-size:14px; font-family:Poppins,sans-serif; color:#1e293b; background:#f8fafc;
    outline:none; box-sizing:border-box; margin-top:8px;
  }
  input[type="datetime-local"]:focus { border-color:#667eea; box-shadow:0 0 0 4px rgba(102,126,234,0.1); }

  .location-btn {
    width:100%; padding:13px; background:linear-gradient(135deg,#f093fb,#f5576c);
    color:#fff; border:none; border-radius:12px; cursor:pointer; font-size:14px;
    font-weight:600; font-family:Poppins,sans-serif; transition:0.3s; margin-top:8px;
  }
  .location-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(240,147,251,0.4); }
  .loc-status { display:block; margin-top:8px; font-size:13px; font-weight:500; color:#94a3b8; min-height:18px; }
  .loc-status.success { color:#10b981; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <span class="header-icon">📍</span>
      <div>
        <h1>Location & Availability</h1>
        <div class="header-sub">Help customers find you nearby</div>
      </div>
    </div>
  </div>

  <div class="steps">
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step active"></div>
  </div>

  <div class="form-container">
    <div class="form-group">
      <label>Your Current Location</label>
      <button class="location-btn" onclick="getLocation()">📍 Get My Location</button>
      <span class="loc-status" id="locationStatus">Location not captured yet</span>
    </div>

    <div class="form-group">
      <label>Availability Status</label>
      <div class="avail-options">
        <div class="avail-card" id="card-available" onclick="selectAvail('available')">
          <span>✅</span><p>Available Now</p>
        </div>
        <div class="avail-card" id="card-busy" onclick="selectAvail('busy')">
          <span>⏳</span><p>Busy Until...</p>
        </div>
      </div>
    </div>

    <div class="form-group" id="busySection" style="display:none;">
      <label>Available again from</label>
      <input type="datetime-local" id="busyUntil"/>
    </div>

    <p id="error" style="color:#ef4444;font-size:13px;text-align:center;min-height:18px;margin-top:4px;"></p>
    <button class="submit-btn" onclick="completeRegistration()">Complete Registration 🎉</button>
    <div class="back-link"><a href="module-skills.html">← Back</a></div>
  </div>
</div>

<script src="../../config.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!localStorage.getItem('reg_otp_verified')) window.location.href = 'index.html';
  selectAvail('available');
});

let userLocation = null;
let availability = 'available';

function getLocation() {
  const status = document.getElementById('locationStatus');
  status.className = 'loc-status';
  status.textContent = 'Detecting location...';
  if (!navigator.geolocation) { status.textContent = 'Geolocation not supported'; return; }
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      status.className = 'loc-status success';
      status.textContent = `✓ Captured: ${userLocation.lat.toFixed(4)}, ${userLocation.lng.toFixed(4)}`;
    },
    () => { status.textContent = 'Unable to get location. Please allow access.'; }
  );
}

function selectAvail(val) {
  availability = val;
  document.getElementById('card-available').className = 'avail-card' + (val === 'available' ? ' selected-avail' : '');
  document.getElementById('card-busy').className = 'avail-card' + (val === 'busy' ? ' selected-busy' : '');
  document.getElementById('busySection').style.display = val === 'busy' ? 'block' : 'none';
}

async function completeRegistration() {
  const error = document.getElementById('error');
  error.textContent = '';

  if (!userLocation) { error.textContent = 'Please capture your location first'; return; }
  if (availability === 'busy' && !document.getElementById('busyUntil').value) {
    error.textContent = 'Please select when you will be available again'; return;
  }

  const modules = JSON.parse(localStorage.getItem('reg_modules') || '[]');
  const photoData = localStorage.getItem('reg_photo');
  const password = localStorage.getItem('reg_password');

  if (!password) { error.textContent = 'Session expired. Please restart registration.'; return; }

  const formData = new FormData();
  formData.append('name', localStorage.getItem('reg_name'));
  formData.append('phone', localStorage.getItem('reg_phone'));
  formData.append('address', localStorage.getItem('reg_address'));
  formData.append('workerType', modules.length === 2 ? 'both' : (modules[0] || 'domestic'));
  formData.append('skills', localStorage.getItem('reg_skills') || '[]');
  formData.append('lat', userLocation.lat);
  formData.append('lng', userLocation.lng);
  formData.append('availability', availability);
  formData.append('password', password);
  if (availability === 'busy') formData.append('expectedCompletionTime', document.getElementById('busyUntil').value);

  // Convert base64 photo to blob if exists
  if (photoData) {
    const blob = await fetch(photoData).then(r => r.blob());
    formData.append('profilePhoto', blob, 'profile.jpg');
  }

  try {
    const res = await fetch(`${CONFIG.WORKER_AUTH_URL}/api/register`, {
      method: 'POST',
      body: formData
    });
    const result = await res.json();

    if (res.ok) {
      localStorage.setItem('workerId', result.workerId);
      ['reg_name','reg_phone','reg_address','reg_photo','reg_modules','reg_skills','reg_agriRole','reg_otp_verified','reg_password']
        .forEach(k => localStorage.removeItem(k));
      window.location.href = '../../worker-dashboard/frontend/dashboard.html';
    } else {
      error.textContent = result.message || 'Registration failed';
    }
  } catch (err) {
    error.textContent = 'Network error. Please try again.';
  }
}
</script>
</body>
</html>
