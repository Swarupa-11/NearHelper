<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Registration - NearHelper</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👷</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <span class="header-icon">👷</span>
        <div>
          <h1 id="title">Worker Registration</h1>
          <div class="header-sub">Join NearHelper and find jobs near you</div>
        </div>
      </div>
      <div class="language-selector">
        <select id="languageSelect" onchange="changeLanguage()">
          <option value="en">English</option>
          <option value="hi">हिंदी</option>
          <option value="te">తెలుగు</option>
          <option value="ta">தமிழ்</option>
        </select>
        <button onclick="toggleVoice()" id="voiceBtn">🔊 Voice</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('register')">📝 Register</button>
      <button class="tab" onclick="showTab('login')">🔑 Login</button>
    </div>

    <div id="registerForm" class="form-container">
      <form onsubmit="sendOTP(event)">
        <div class="form-group">
          <label id="nameLabel">Full Name</label>
          <div class="input-wrap">
            <input type="text" id="name" placeholder="Enter your full name" required>
            <button type="button" class="voice-btn" onclick="startVoiceInput('name')">🎤</button>
          </div>
        </div>

        <div class="form-group">
          <label id="phoneLabel">Phone Number</label>
          <input type="tel" id="phone" maxlength="10" placeholder="10-digit mobile number" required>
        </div>

        <div class="form-group">
          <label id="addressLabel">Address</label>
          <div class="input-wrap" style="align-items:flex-start;">
            <textarea id="address" placeholder="Enter your full address" required></textarea>
            <button type="button" class="voice-btn" onclick="startVoiceInput('address')">🎤</button>
          </div>
        </div>

        <p id="regError" style="color:#ef4444;font-size:13px;text-align:center;min-height:18px;"></p>
        <button type="submit" class="submit-btn" id="submitBtn">Send OTP →</button>

        <div class="back-link">Already have an account? <a href="#" onclick="showTab('login')">Login here</a></div>
      </form>
    </div>

    <div id="loginForm" class="form-container" style="display:none;">
      <form onsubmit="loginWorker(event)">
        <div class="form-group">
          <label id="loginPhoneLabel">Phone Number</label>
          <input type="tel" id="loginPhone" maxlength="10" placeholder="Enter your registered phone" required>
        </div>

        <div class="form-group">
          <label>OTP Verification</label>
          <button type="button" onclick="sendOTPLogin('worker')" class="submit-btn" style="margin-bottom:10px;">📱 Send OTP</button>
          <input type="text" id="otp" maxlength="6" placeholder="Enter OTP received on your phone">
        </div>

        <button type="submit" class="submit-btn" id="loginBtn">Login →</button>

        <div class="back-link">New here? <a href="#" onclick="showTab('register')">Create an account</a></div>
        <div class="back-link" style="margin-top:10px;"><a href="../../index.html">← Back to Home</a></div>
      </form>
    </div>
  </div>

  <script src="../../config.js?v=2"></script>
  <script src="js/script.js"></script>
  <script>
    function showTab(tab) {
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'register') || (i === 1 && tab === 'login'));
      });
    }
  </script>
</body>
</html>
