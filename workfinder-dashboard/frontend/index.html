<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Workers - NearHelper</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Find Workers Dashboard</h1>
      <div class="user-info">
        <button onclick="viewMyRequests()" class="notification-btn">📋 My Requests <span id="requestBadge" class="badge"></span></button>
        <span id="userName"></span>
        <button onclick="logout()" class="logout-btn">Logout</button>
      </div>
    </div>

    <div class="search-section">
      <h2>Search for Workers</h2>
      
      <div class="search-form">
        <div class="form-row">
          <div class="form-group">
            <label>Worker Type</label>
            <select id="workerType">
              <option value="">All Types</option>
              <option value="domestic">Domestic Workers</option>
              <option value="agricultural">Agricultural Workers</option>
            </select>
          </div>

          <div class="form-group">
            <label>Search Radius (km)</label>
            <input type="number" id="radius" value="10" min="1" max="100">
          </div>
        </div>

        <div class="form-group">
          <label>Skills (optional, comma separated)</label>
          <input type="text" id="skills" placeholder="e.g., cooking, cleaning, driving">
        </div>

        <button onclick="searchWorkers()" class="search-btn">🔍 Search Workers Near Me</button>
      </div>
    </div>

    <div class="results-section">
      <h2>Available Workers <span id="resultCount"></span></h2>
      <div id="workersList" class="workers-list"></div>
    </div>
  </div>

  <div id="workerModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2>Worker Details</h2>
      <div id="workerDetails"></div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
