<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Set Password – NearHelper</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <span class="header-icon">🔒</span>
      <div>
        <h1>Set Password</h1>
        <div class="header-sub">Create a password for your account</div>
      </div>
    </div>
  </div>

  <div class="form-container">
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Minimum 6 characters"/>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter your password"/>
    </div>
    <p id="error" style="color:#ef4444;font-size:13px;text-align:center;min-height:18px;"></p>
    <button class="submit-btn" onclick="proceed()">Continue →</button>
  </div>
</div>

<script>
function proceed() {
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPassword').value;
  const error = document.getElementById('error');
  if (password.length < 6) { error.textContent = 'Password must be at least 6 characters'; return; }
  if (password !== confirm) { error.textContent = 'Passwords do not match'; return; }
  localStorage.setItem('reg_password', password);
  window.location.href = 'profile-photo.html';
}
</script>
</body>
</html>
