<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Finder Registration - NearHelper</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <span class="header-icon">🔍</span>
        <div>
          <h1 id="title">Find Workers Near You</h1>
          <div class="header-sub">Hire skilled workers in your area instantly</div>
        </div>
      </div>
      <div class="language-selector">
        <select id="languageSelect" onchange="changeLanguage()">
          <option value="en">English</option>
          <option value="hi">हिंदी</option>
          <option value="te">తెలుగు</option>
          <option value="ta">தமிழ்</option>
        </select>
        <button onclick="toggleVoice()" id="voiceBtn">🔊 Voice</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('register')">📝 Register</button>
      <button class="tab" onclick="showTab('login')">🔑 Login</button>
    </div>

    <div id="registerForm" class="form-container">
      <form onsubmit="registerUser(event)">
        <div class="form-group">
          <label id="nameLabel">Full Name</label>
          <div class="input-wrap">
            <input type="text" id="name" placeholder="Enter your full name" required>
            <button type="button" class="voice-btn" onclick="startVoiceInput('name')">🎤</button>
          </div>
        </div>

        <div class="form-group">
          <label id="phoneLabel">Phone Number</label>
          <input type="tel" id="phone" pattern="[0-9]{10}" placeholder="10-digit mobile number" required>
        </div>

        <div class="form-group">
          <label>OTP Verification</label>
          <div style="display:flex;gap:8px;margin-bottom:10px;">
            <button type="button" onclick="sendRegOTP('workfinder')" class="submit-btn" id="sendRegOtpBtn" style="flex:1;background:linear-gradient(135deg,#11998e,#38ef7d);">📱 Send OTP</button>
            <button type="button" onclick="sendRegOTP('workfinder')" class="submit-btn" id="resendRegOtpBtn" style="flex:1;display:none;background:linear-gradient(135deg,#11998e,#38ef7d);">🔄 Resend OTP</button>
          </div>
          <span id="regOtpTimer" style="font-size:12px;color:#aaa;"></span>
          <input type="text" id="regOtp" maxlength="6" placeholder="Enter OTP to verify phone" required>
        </div>

        <div class="form-group">
          <label id="userTypeLabel">I am a</label>
          <select id="userType" required>
            <option value="household" id="householdOption">🏠 Household Customer</option>
            <option value="farmer" id="farmerOption">🌾 Farmer</option>
          </select>
        </div>

        <div class="form-group">
          <label id="addressLabel">Address</label>
          <div class="input-wrap" style="align-items:flex-start;">
            <textarea id="address" placeholder="Enter your full address" required></textarea>
            <button type="button" class="voice-btn" onclick="startVoiceInput('address')">🎤</button>
          </div>
        </div>

        <div class="form-group">
          <button type="button" onclick="getLocation()" id="locationBtn">📍 Get My Location</button>
          <span id="locationStatus"></span>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Create Account →</button>

        <div class="back-link">Already have an account? <a href="#" onclick="showTab('login')">Login here</a></div>
        <div class="back-link" style="margin-top:10px;"><a href="../../index.html">← Back to Home</a></div>
      </form>
    </div>

    <div id="loginForm" class="form-container" style="display:none;">
      <form onsubmit="loginUser(event)">
        <div class="form-group">
          <label id="loginPhoneLabel">Phone Number</label>
          <input type="tel" id="loginPhone" pattern="[0-9]{10}" placeholder="Enter your registered phone" required>
        </div>

        <div class="form-group">
          <label>OTP Verification</label>
          <button type="button" onclick="sendOTP('workfinder')" class="submit-btn" style="margin-bottom:10px; background:linear-gradient(135deg,#11998e,#38ef7d);">📱 Send OTP</button>
          <input type="text" id="otp" maxlength="6" placeholder="Enter OTP received on your phone">
        </div>

        <button type="submit" class="submit-btn" id="loginBtn">Login →</button>

        <div class="back-link">New here? <a href="#" onclick="showTab('register')">Create an account</a></div>
        <div class="back-link" style="margin-top:10px;"><a href="../../index.html">← Back to Home</a></div>
      </form>
    </div>
  </div>

  <script src="../../config.js"></script>
  <script src="js/script.js"></script>
  <script>
    function showTab(tab) {
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'register') || (i === 1 && tab === 'login'));
      });
    }
  </script>
</body>
</html>
