<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password – NearHelper</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
  .otp-input { text-align:center; font-size:28px; letter-spacing:12px; font-weight:700; }
  .step-section { display:none; }
  .step-section.active { display:block; }
  .success-msg { color:#22c55e; font-size:13px; text-align:center; min-height:18px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <span class="header-icon">🔑</span>
      <div>
        <h1>Forgot Password</h1>
        <div class="header-sub">Reset your account password</div>
      </div>
    </div>
  </div>

  <div class="form-container">

    <!-- Step 1: Enter phone & send OTP -->
    <div class="step-section active" id="step1">
      <div class="form-group">
        <label>Registered Mobile Number</label>
        <input type="tel" id="phone" maxlength="10" placeholder="Enter your 10-digit mobile number"/>
      </div>
      <p id="step1Error" style="color:#ef4444;font-size:13px;text-align:center;min-height:18px;"></p>
      <button class="submit-btn" onclick="sendOTP()">Send OTP →</button>
      <div class="back-link"><a href="index.html">← Back to Login</a></div>
    </div>

    <!-- Step 2: Verify OTP -->
    <div class="step-section" id="step2">
      <p style="text-align:center;color:#64748b;font-size:14px;">OTP sent to <strong id="phoneDisplay" style="color:#11998e;"></strong></p>
      <div class="form-group">
        <label>Enter OTP</label>
        <input type="tel" id="otp" maxlength="6" placeholder="• • • • • •" class="otp-input" oninput="onOTPInput()"/>
      </div>
      <p id="step2Error" style="color:#ef4444;font-size:13px;text-align:center;min-height:18px;"></p>
      <button class="submit-btn" id="verifyBtn" onclick="verifyOTP()" disabled>Verify OTP</button>
      <div class="back-link" style="margin-top:10px;"><a href="#" onclick="goToStep(1)">← Back</a></div>
    </div>

    <!-- Step 3: Set new password -->
    <div class="step-section" id="step3">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="Minimum 6 characters"/>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter new password"/>
      </div>
      <p id="step3Error" style="color:#ef4444;font-size:13px;text-align:center;min-height:18px;"></p>
      <button class="submit-btn" onclick="resetPassword()">Update Password</button>
    </div>

  </div>
</div>

<script src="../../config.js?v=2"></script>
<script>
let verifiedPhone = null;

function goToStep(n) {
  document.querySelectorAll('.step-section').forEach((s, i) => {
    s.classList.toggle('active', i + 1 === n);
  });
}

function onOTPInput() {
  document.getElementById('verifyBtn').disabled = document.getElementById('otp').value.trim().length < 4;
}

async function sendOTP() {
  const phone = document.getElementById('phone').value.trim();
  const error = document.getElementById('step1Error');
  if (!/^\d{10}$/.test(phone)) { error.textContent = 'Enter a valid 10-digit mobile number'; return; }

  try {
    const checkRes = await fetch(`${CONFIG.WORKFINDER_AUTH_URL}/api/check-phone-exists`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const checkData = await checkRes.json();
    if (!checkRes.ok) { error.textContent = checkData.message; return; }

    const res = await fetch(`${CONFIG.WORKFINDER_AUTH_URL}/api/send-otp`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const data = await res.json();
    if (!res.ok) { error.textContent = data.message || 'Failed to send OTP'; return; }

    verifiedPhone = phone;
    document.getElementById('phoneDisplay').textContent = '+91 ' + phone;
    goToStep(2);
  } catch (err) {
    error.textContent = 'Network error. Please try again.';
  }
}

async function verifyOTP() {
  const otp = document.getElementById('otp').value.trim();
  const error = document.getElementById('step2Error');
  const btn = document.getElementById('verifyBtn');

  btn.disabled = true;
  btn.textContent = 'Verifying...';

  try {
    const res = await fetch(`${CONFIG.WORKFINDER_AUTH_URL}/api/verify-otp`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: verifiedPhone, otp })
    });
    const data = await res.json();
    if (res.ok) {
      goToStep(3);
    } else {
      error.textContent = data.message || 'Invalid OTP';
      btn.disabled = false;
      btn.textContent = 'Verify OTP';
    }
  } catch (err) {
    error.textContent = 'Network error. Try again.';
    btn.disabled = false;
    btn.textContent = 'Verify OTP';
  }
}

async function resetPassword() {
  const password = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  const error = document.getElementById('step3Error');

  if (password.length < 6) { error.textContent = 'Password must be at least 6 characters'; return; }
  if (password !== confirm) { error.textContent = 'Passwords do not match'; return; }

  try {
    const res = await fetch(`${CONFIG.WORKFINDER_AUTH_URL}/api/reset-password`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: verifiedPhone, password })
    });
    const result = await res.json();
    if (res.ok) {
      alert('Password updated successfully!');
      window.location.href = 'index.html';
    } else {
      error.textContent = result.message || 'Reset failed';
    }
  } catch (err) {
    error.textContent = 'Network error. Please try again.';
  }
}
</script>
</body>
</html>
