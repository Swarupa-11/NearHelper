<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password – NearHelper</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <span class="header-icon">🔑</span>
      <div>
        <h1>Forgot Password</h1>
        <div class="header-sub">Verify your mobile to reset password</div>
      </div>
    </div>
  </div>

  <div class="form-container">
    <div class="form-group">
      <label>Registered Mobile Number</label>
      <input type="tel" id="phone" maxlength="10" placeholder="Enter your 10-digit mobile number"/>
    </div>
    <p id="error" style="color:#ef4444;font-size:13px;text-align:center;min-height:18px;"></p>
    <button class="submit-btn" onclick="sendOTP()">Send OTP →</button>
    <div class="back-link"><a href="index.html">← Back to Login</a></div>
  </div>
</div>

<script src="../../config.js?v=2"></script>
<script>
async function sendOTP() {
  const phone = document.getElementById('phone').value.trim();
  const error = document.getElementById('error');
  if (!/^\d{10}$/.test(phone)) { error.textContent = 'Enter a valid 10-digit mobile number'; return; }

  try {
    // Check phone is registered
    const checkRes = await fetch(`${CONFIG.WORKER_AUTH_URL}/api/check-phone-exists`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const checkData = await checkRes.json();
    if (!checkRes.ok) { error.textContent = checkData.message; return; }

    // Send OTP
    const res = await fetch(`${CONFIG.WORKER_AUTH_URL}/api/send-otp`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const data = await res.json();
    if (!res.ok) { error.textContent = data.message || 'Failed to send OTP'; return; }

    localStorage.setItem('reg_phone', phone);
    localStorage.setItem('otp_flow', 'forgot');
    window.location.href = 'verify.html';
  } catch (err) {
    error.textContent = 'Network error. Please try again.';
  }
}
</script>
</body>
</html>
