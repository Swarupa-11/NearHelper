<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password – NearHelper</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <span class="header-icon">🔓</span>
      <div>
        <h1>Reset Password</h1>
        <div class="header-sub">Set your new password</div>
      </div>
    </div>
  </div>

  <div class="form-container">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="password" placeholder="Minimum 6 characters"/>
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter new password"/>
    </div>
    <p id="error" style="color:#ef4444;font-size:13px;text-align:center;min-height:18px;"></p>
    <button class="submit-btn" onclick="resetPassword()">Update Password</button>
  </div>
</div>

<script src="../../config.js?v=2"></script>
<script>
async function resetPassword() {
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPassword').value;
  const error = document.getElementById('error');

  if (password.length < 6) { error.textContent = 'Password must be at least 6 characters'; return; }
  if (password !== confirm) { error.textContent = 'Passwords do not match'; return; }

  const phone = localStorage.getItem('reg_phone');
  try {
    const res = await fetch(`${CONFIG.WORKER_AUTH_URL}/api/reset-password`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, password })
    });
    const result = await res.json();
    if (res.ok) {
      localStorage.removeItem('reg_phone');
      localStorage.removeItem('otp_flow');
      alert('Password updated successfully!');
      window.location.href = 'index.html';
    } else {
      error.textContent = result.message || 'Reset failed';
    }
  } catch (err) {
    error.textContent = 'Network error. Please try again.';
  }
}
</script>
</body>
</html>
